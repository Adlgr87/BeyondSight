name: CI Code Quality

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          pip install ruff pytest
      - name: Lint with Ruff
        run: |
          # Stop the build if there are syntax errors or undefined names
          ruff check . --select=E9,F63,F7,F82 --show-source
      - name: Test with pytest checking for syntax
        run: |
          if [ -d "tests" ]; then pytest tests/; else echo "No tests folder found, skipping"; fi
