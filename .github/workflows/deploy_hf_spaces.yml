name: Sync to Hugging Face Spaces

on:
  push:
    branches: [main]

  # Permite lanzar este flujo manualmente desde la pestaña Actions
  workflow_dispatch:

jobs:
  sync-to-spaces:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Push to Hugging Face
        env:
          # HF_TOKEN debe estar configurado en Github Secrets (Settings > Secrets and variables > Actions > Repository secrets)
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          # Ajusta este nombre de Space a tu usuario y Repositorio en HF
          # Por ejemplo, si tu Space se llama BeyondSight en el usuario Adlgr87, debe ser "Adlgr87/BeyondSight"
          SPACE_ID: "Adlgr87/BeyondSight"
        run: |
          git config user.email "action@github.com"
          git config user.name "GitHub Action"
          git push -f https://Adlgr87:$HF_TOKEN@huggingface.co/spaces/$SPACE_ID main
