name: PVU-BS Validation (offline)

on:
  pull_request:
    branches: ["main", "master"]
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode: offline (CI-safe) or llm (requires secrets)"
        required: true
        default: "offline"
        type: choice
        options:
          - offline
          - llm
      cases:
        description: "Path to cases folder"
        required: false
        default: "datasets/pvu_cases"

jobs:
  pvu:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine run mode and cases path
        id: params
        run: |
          MODE="${{ github.event.inputs.mode }}"
          CASES="${{ github.event.inputs.cases }}"
          # Defaults for PR triggers (workflow_dispatch inputs are empty)
          if [ -z "$MODE" ]; then MODE="offline"; fi
          if [ -z "$CASES" ]; then CASES="datasets/pvu_cases"; fi
          echo "mode=$MODE" >> "$GITHUB_OUTPUT"
          echo "cases=$CASES" >> "$GITHUB_OUTPUT"

      - name: Check LLM secrets availability (llm mode only)
        if: steps.params.outputs.mode == 'llm'
        run: |
          if [ -z "$OPENROUTER_API_KEY" ] && [ -z "$OPENAI_API_KEY" ] && [ -z "$GROQ_API_KEY" ]; then
            echo "::error::LLM mode requested but no API key secrets are configured."
            echo "::error::Set OPENROUTER_API_KEY, OPENAI_API_KEY, or GROQ_API_KEY in repository secrets."
            exit 1
          fi
          echo "LLM secrets found — proceeding with llm mode."
        env:
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}

      - name: Run PVU benchmark
        env:
          PYTHONHASHSEED: "0"
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          MODE="${{ steps.params.outputs.mode }}"
          CASES="${{ steps.params.outputs.cases }}"
          echo "Running PVU in $MODE mode on cases: $CASES"
          python -m benchmarks.runner \
            --cases "$CASES" \
            --"$MODE" \
            --seed 0 \
            --out reports/validation/ci

      - name: Upload PVU report artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pvu-report-${{ github.run_id }}
          path: reports/validation/ci
          retention-days: 30
