site_name: BeyondSight Documentation
site_description: Hybrid social dynamics simulator — Numerical core + LLM as regime selector.
theme:
  name: material
  palette:
    scheme: slate
    primary: blue
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          setup_commands:
            - import sys
            - sys.path.append(".")

nav:
  - Home: index.md
  - API Reference: api.md
  - Spanish Version: README_ES.md
